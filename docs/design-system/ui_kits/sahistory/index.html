// Expose DS components globally so the kit screen files can use them by name.
Object.assign(window, window.SAHODesignSystem_50e062);
</script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="BiographyScreen.jsx"></script>
<script type="text/babel" src="TimelineScreen.jsx"></script>
<script type="text/babel" src="SearchScreen.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const SCREENS = { home: 'HomeScreen', biography: 'BiographyScreen', timeline: 'TimelineScreen', search: 'SearchScreen' };

function App() {
  const [route, setRoute] = useState(location.hash.replace('#', '') || 'home');
  useEffect(() => {
    const onHash = () => setRoute(location.hash.replace('#', '') || 'home');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const key = SCREENS[route] ? route : 'home';
  const Screen = window[SCREENS[key]];
  const go = (k) => { location.hash = k; setRoute(k); window.scrollTo(0, 0); };
  return (
    <div>
      <SiteHeader active={key} onNav={go} />
      {Screen ? <Screen /> : null}
      <SiteFooter />
    </div>
  );
}

// Intercept in-page data-nav links for SPA-style navigation.
document.addEventListener('click', (e) => {
  const a = e.target.closest('a[data-nav]');
  if (a) { e.preventDefault(); location.hash = a.getAttribute('data-nav'); window.scrollTo(0, 0); }
});

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
