name: SAHO 2027
type: theme
description: 'The Open Record — South African History Online 2027 design standard. Single Directory Components for Layout Builder. Mobile-first, archival, aligned.'
package: SAHO
core_version_requirement: ^10.3 || ^11
base theme: false

# Global libraries: tokens, fonts, base element styles and the Layout Builder
# alignment system are attached on every page. Each SDC ships its own scoped CSS.
libraries:
  - saho/global-styling

# Layout Builder region placeholders use these regions on the block/site level.
regions:
  header: Header
  primary_menu: 'Primary menu'
  breadcrumb: Breadcrumb
  content: Content
  sidebar: 'Record rail'
  footer: Footer

# Component libraries are auto-discovered from /components (SDC).
