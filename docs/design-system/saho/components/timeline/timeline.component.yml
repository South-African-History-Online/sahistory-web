$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Timeline
status: stable
group: 'SAHO Navigation'
description: 'The chronology spine — SAHO''s first-class navigational surface. Dot markers on a ruled spine, optional theme filter toggles. Chronology is how this material wants to be navigated.'
props:
  type: object
  properties:
    title:
      type: string
      title: Title
      default: Chronology
    themes:
      type: array
      title: 'Filter themes'
      items: { type: string }
    events:
      type: array
      title: Events
      items:
        type: object
        properties:
          year: { type: string }
          title: { type: string }
          detail: { type: string }
          theme: { type: string }
          href: { type: string }
