$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: 'Content warning'
status: stable
group: 'SAHO Provenance'
description: 'Sensitivity gate for difficult imagery and topics. Obscures content behind a calm, dignified notice the reader chooses to reveal. No sensationalism.'
props:
  type: object
  properties:
    reason:
      type: string
      title: 'What the reader is about to see'
      default: 'This page contains imagery and accounts of apartheid-era violence.'
    reveal_label:
      type: string
      title: 'Reveal button label'
      default: 'Show content'
slots:
  content:
    title: 'Protected content'
