$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Button
status: stable
group: 'SAHO Core'
description: 'Institutional action button. Square, Archivo semibold, oxblood primary. Renders as <a> when a URL is given, else <button>.'
props:
  type: object
  properties:
    variant:
      type: string
      title: Variant
      enum: [primary, secondary, outline, quiet, ghost]
      default: primary
    size:
      type: string
      title: Size
      enum: [sm, md, lg]
      default: md
    href:
      type: string
      title: 'URL (renders as link)'
    icon_after:
      type: string
      title: 'Trailing glyph'
      description: 'A single Unicode glyph, e.g. → . No decorative icons.'
    full_width:
      type: boolean
      default: false
    disabled:
      type: boolean
      default: false
slots:
  label:
    title: Label
