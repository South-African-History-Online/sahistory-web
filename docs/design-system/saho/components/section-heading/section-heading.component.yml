$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: 'Section heading'
status: stable
group: 'SAHO Core'
description: 'A ruled section title for Layout Builder pages. The primary alignment device: a strong 2px underline that squares every section to the same baseline. Optional kicker and "view all" link.'
props:
  type: object
  properties:
    title:
      type: string
      title: Title
    kicker:
      type: string
      title: 'Kicker (eyebrow)'
    level:
      type: string
      title: 'Heading level'
      enum: [h2, h3, h4]
      default: h2
    href:
      type: string
      title: 'Link URL'
    link_label:
      type: string
      title: 'Link label'
      default: 'View all'
