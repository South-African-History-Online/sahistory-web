$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Badge
status: stable
group: 'SAHO Core'
description: 'Content-type badge. Names what a record is (biography, event, place…) with the meaning-bearing hue. Colour is never the sole signal — the type is always labelled.'
props:
  type: object
  properties:
    type:
      type: string
      title: 'Content type'
      enum: [article, biography, place, archive, event, topic]
      default: article
    label:
      type: string
      title: 'Label override'
    on_image:
      type: boolean
      title: 'Over imagery'
      default: false
