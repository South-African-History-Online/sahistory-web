$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Citation
status: stable
group: 'SAHO Provenance'
description: '"Cite this entry." Selectable Chicago / APA / MLA formats rendered in mono, copyable. Makes attribution a first-class action on every record.'
props:
  type: object
  properties:
    default_format:
      type: string
      title: 'Default format'
      enum: [Chicago, APA, MLA]
      default: Chicago
    formats:
      type: object
      title: 'Format → citation string'
      description: 'Keyed by format name. If omitted, editors supply chicago/apa/mla individually.'
    chicago:
      type: string
    apa:
      type: string
    mla:
      type: string
