$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: 'Related list'
status: stable
group: 'SAHO Navigation'
description: 'The connective tissue — cross-references that knit people, events, places and dates together. A content-type dot marks each item (and the type is labelled, so colour is never the sole signal).'
props:
  type: object
  properties:
    title:
      type: string
      title: Title
      default: Related
    items:
      type: array
      title: Items
      items:
        type: object
        properties:
          label: { type: string }
          type: { type: string, enum: [article, biography, place, archive, event, topic] }
          note: { type: string }
          href: { type: string }
