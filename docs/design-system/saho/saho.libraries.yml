# SAHO global styling. Attached on every page via saho.info.yml.
# Order matters: fonts + tokens first, then base element defaults, then the
# Layout Builder alignment system.
global-styling:
  version: 1.x
  css:
    base:
      css/saho.fonts.css: {}
      css/saho.tokens.css: {}
      css/saho.base.css: {}
    layout:
      css/saho.layouts.css: {}

# Optional: small progressive-enhancement behaviours (sortable index tables,
# citation format switch, content-warning reveal, timeline filter). Each SDC
# also declares only what it needs; this is the shared bundle.
behaviours:
  version: 1.x
  js:
    js/saho.behaviours.js: { attributes: { defer: true } }
  dependencies:
    - core/drupal
    - core/once
