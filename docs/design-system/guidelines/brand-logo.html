<!-- @dsCard group="Brand" viewport="700x230" name="Logo" subtitle="SAHO heritage emblem on paper and on ink" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--surface-page); display: grid; grid-template-columns: 1fr 1fr; min-height: 230px; }
  .cell { display: flex; align-items: center; gap: 16px; padding: 28px 32px; }
  .cell--ink { background: var(--saho-ink); }
  .lockup .org { font-family: var(--font-display); font-weight: 800; font-size: 19px; line-height: 1.1; color: var(--text-primary); letter-spacing: -0.01em; }
  .lockup .tag { font-family: var(--font-sans); font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 3px; }
  .cell--ink .org { color: var(--text-on-dark); }
  .cell--ink .tag { color: #bcae98; }
  img { width: 64px; height: 64px; }
</style>
</head>
<body>
  <div class="cell">
    <img src="../assets/saho-logo.svg" alt="SAHO emblem">
    <div class="lockup"><div class="org">South African<br>History Online</div><div class="tag">Towards a people's history</div></div>
  </div>
  <div class="cell cell--ink">
    <img src="../assets/saho-logo.svg" alt="SAHO emblem">
    <div class="lockup"><div class="org">South African<br>History Online</div><div class="tag">Towards a people's history</div></div>
  </div>
</body>
</html>
