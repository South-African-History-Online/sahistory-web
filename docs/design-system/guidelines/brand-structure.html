<!-- @dsCard group="Brand" viewport="700x280" name="Catalogue structure" subtitle="Square corners, ruled hairlines, accession refs: the archive made visible" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--surface-page); }
  .rec { border: 1px solid var(--border-default); border-top: 2px solid var(--type-biography); background: var(--surface-card); max-width: 460px; }
  .strip { display: flex; align-items: stretch; border-bottom: 1px solid var(--border-default); }
  .tab { background: var(--type-biography); color: #fff; font-family: var(--font-sans); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 6px 11px; }
  .ref { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); padding: 6px 11px; border-left: 1px solid var(--border-default); }
  .ref b { color: var(--text-primary); }
  .body { padding: 14px; }
  .ttl { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--text-primary); margin: 0 0 12px; }
  .field { display: grid; grid-template-columns: 92px 1fr; border-top: 1px solid var(--border-faint); }
  .k { font-family: var(--font-mono); font-size: 11px; letter-spacing: .05em; text-transform: uppercase; color: var(--text-muted); padding: 7px 12px 7px 0; }
  .v { font-family: var(--font-sans); font-size: 14px; color: var(--text-primary); padding: 7px 0; }
  .note { font-family: var(--font-sans); font-size: 12px; color: var(--text-muted); max-width: 200px; line-height: 1.5; }
  .wrap { display: flex; gap: 28px; align-items: flex-start; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="rec">
      <div class="strip"><span class="tab">Biography</span><span class="ref">REF&nbsp; <b>B-0427</b></span></div>
      <div class="body">
        <h3 class="ttl">Nelson Mandela</h3>
        <div class="field"><span class="k">Born</span><span class="v">18 July 1918</span></div>
        <div class="field"><span class="k">Died</span><span class="v">5 December 2013</span></div>
        <div class="field"><span class="k">Sources</span><span class="v">14</span></div>
      </div>
    </div>
    <p class="note">Every page is a record. Square corners, ruled hairlines, a typed tab and an accession reference. Borders do the structural work, not shadows.</p>
  </div>
</body>
</html>
