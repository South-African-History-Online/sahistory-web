<!-- @dsCard group="Type" viewport="700x420" name="Type scale" subtitle="Fluid clamp() ramp · display down to micro metadata" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 32px; background: var(--surface-page); }
  .r { display: flex; align-items: baseline; gap: 18px; padding: 5px 0; border-bottom: 1px solid var(--border-faint); }
  .r:last-child { border-bottom: 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 132px; flex: none; letter-spacing: .04em; }
  .ex { font-family: var(--font-display); color: var(--text-primary); line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="r"><span class="tok">--fs-3xl · h1</span><span class="ex" style="font-size:var(--fs-3xl);font-family:var(--font-masthead);font-weight:400;letter-spacing:var(--ls-display)">Apartheid</span></div>
  <div class="r"><span class="tok">--fs-2xl · h2</span><span class="ex" style="font-size:var(--fs-2xl);font-weight:700">Resistance &amp; reform</span></div>
  <div class="r"><span class="tok">--fs-xl · h3</span><span class="ex" style="font-size:var(--fs-xl);font-weight:700">The defiance campaign</span></div>
  <div class="r"><span class="tok">--fs-lg · h4</span><span class="ex" style="font-size:var(--fs-lg)">Treason trial begins</span></div>
  <div class="r"><span class="tok">--fs-base · body</span><span class="ex" style="font-size:var(--fs-base);font-family:var(--font-serif)">Long-form reference body text</span></div>
  <div class="r"><span class="tok">--fs-xs · meta</span><span class="ex" style="font-size:var(--fs-xs);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)">Metadata · provenance</span></div>
</body>
</html>
