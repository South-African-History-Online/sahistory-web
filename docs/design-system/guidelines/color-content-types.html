<!-- @dsCard group="Colors" viewport="700x220" name="Content-type hues" subtitle="Meaning-bearing colour for archive content types" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--surface-page); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .item { width: 134px; }
  .bar { height: 8px; border-radius: var(--radius-full); }
  .badge { display: inline-block; margin-top: 10px; font-family: var(--font-sans); font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: #fff; padding: 4px 9px; border-radius: var(--radius-xs); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 7px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="background:var(--type-article)"></div><span class="badge" style="background:var(--type-article)">Article</span><div class="hex">#990000</div></div>
    <div class="item"><div class="bar" style="background:var(--type-biography)"></div><span class="badge" style="background:var(--type-biography)">Biography</span><div class="hex">#2d5016</div></div>
    <div class="item"><div class="bar" style="background:var(--type-place)"></div><span class="badge" style="background:var(--type-place)">Place</span><div class="hex">#3a4a64</div></div>
    <div class="item"><div class="bar" style="background:var(--type-archive)"></div><span class="badge" style="background:var(--type-archive)">Archive</span><div class="hex">#8a6420</div></div>
    <div class="item"><div class="bar" style="background:var(--type-event)"></div><span class="badge" style="background:var(--type-event)">Event</span><div class="hex">#211b14</div></div>
  </div>
</body>
</html>
