<!-- @dsCard group="Colors" viewport="700x220" name="Paper & ink" subtitle="Cool aged newsprint grounds and printer's-ink text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--surface-page); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 150px; }
  .chip { height: 64px; border: 1px solid var(--border-default); }
  .name { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--text-primary); margin: 8px 0 1px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--saho-paper)"></div><div class="name">Paper</div><div class="hex">#e7e4d8 · ground</div></div>
    <div class="sw"><div class="chip" style="background:var(--saho-paper-raised)"></div><div class="name">Paper raised</div><div class="hex">#f1efe7 · records</div></div>
    <div class="sw"><div class="chip" style="background:var(--saho-paper-sunk)"></div><div class="name">Paper sunk</div><div class="hex">#dad6c7 · wells</div></div>
    <div class="sw"><div class="chip" style="background:var(--saho-ink)"></div><div class="name" style="color:var(--text-primary)">Ink</div><div class="hex">#1b1c17 · text AAA</div></div>
    <div class="sw"><div class="chip" style="background:var(--saho-ink-soft)"></div><div class="name">Ink soft</div><div class="hex">#41433a · secondary</div></div>
  </div>
</body>
</html>
