<!-- @dsCard group="Spacing" viewport="700x260" name="Measure & the rail" subtitle="Reading measure and the chronology / cross-reference rail" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--surface-page); }
  .layout { display: grid; grid-template-columns: 1fr 180px; gap: 28px; }
  .prose { font-family: var(--font-serif); font-size: 15px; line-height: 1.62; color: var(--text-secondary); max-width: 52ch; border-left: 1px solid var(--border-default); padding-left: 16px; }
  .rail { border-left: 2px solid var(--accent); padding-left: 14px; position: relative; }
  .rail h5 { font-family: var(--font-mono); font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 10px; }
  .ev { position: relative; padding-bottom: 12px; }
  .ev::before { content: ""; position: absolute; left: -21px; top: 4px; width: 9px; height: 9px; border-radius: var(--radius-full); background: var(--accent); }
  .ev .y { font-family: var(--font-mono); font-size: 11px; color: var(--accent); font-weight: 600; }
  .ev .t { font-family: var(--font-sans); font-size: 12px; color: var(--text-primary); }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <div class="layout">
    <div>
      <div class="prose">Long-form reference body sits on a 68ch measure for comfortable reading. Most pages are dense text; legibility is the priority.</div>
      <div class="lab">--measure · 68ch reading column</div>
    </div>
    <div class="rail">
      <h5>Chronology rail</h5>
      <div class="ev"><div class="y">1948</div><div class="t">Apartheid legislated</div></div>
      <div class="ev"><div class="y">1960</div><div class="t">Sharpeville</div></div>
      <div class="ev"><div class="y">1976</div><div class="t">Soweto Uprising</div></div>
    </div>
  </div>
</body>
</html>
