<!-- @dsCard group="Colors" viewport="700x230" name="Oxblood & ochre" subtitle="One emphasis accent, one warm secondary · used sparingly" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--surface-page); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 150px; }
  .chip { height: 58px; border-radius: var(--radius-sm); display: flex; align-items: flex-end; padding: 8px; }
  .chip span { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,.85); }
  .name { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--text-primary); margin: 8px 0 1px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .note { font-family: var(--font-sans); font-size: 12px; color: var(--text-muted); margin-top: 16px; max-width: none; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--saho-oxblood)"><span>links · emphasis</span></div><div class="name">Oxblood</div><div class="hex">#990000 · AAA on paper</div></div>
    <div class="sw"><div class="chip" style="background:var(--saho-oxblood-deep)"><span>gravity · pressed</span></div><div class="name">Oxblood deep</div><div class="hex">#6e0000</div></div>
    <div class="sw"><div class="chip" style="background:var(--saho-ochre)"><span>section warmth</span></div><div class="name">Ochre</div><div class="hex">#b88a2e</div></div>
    <div class="sw"><div class="chip" style="background:var(--saho-ochre-deep)"><span>text-safe</span></div><div class="name">Ochre deep</div><div class="hex">#8a6420 · AA text</div></div>
  </div>
  <p class="note">Avoid the SA flag palette literally · it reads as state branding, which SAHO is not. Oxblood carries gravity in struggle-history contexts.</p>
</body>
</html>
