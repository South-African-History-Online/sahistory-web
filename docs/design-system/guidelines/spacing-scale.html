<!-- @dsCard group="Spacing" viewport="700x260" name="Baseline scale" subtitle="8px grid · density handled well, not hidden" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--surface-page); }
  .r { display: flex; align-items: center; gap: 16px; margin-bottom: 7px; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 150px; flex: none; }
  .bar { height: 14px; background: var(--accent); border-radius: 1px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="r"><span class="tok">--space-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="r"><span class="tok">--space-4</span><div class="bar" style="width:16px"></div><span class="px">16px · standard</span></div>
  <div class="r"><span class="tok">--space-5</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="r"><span class="tok">--space-6</span><div class="bar" style="width:32px"></div><span class="px">32px · grid gap</span></div>
  <div class="r"><span class="tok">--space-7</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="r"><span class="tok">--space-8</span><div class="bar" style="width:64px"></div><span class="px">64px · section</span></div>
  <div class="r"><span class="tok">--space-9</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
</body>
</html>
