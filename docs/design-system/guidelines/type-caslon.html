<!-- @dsCard group="Type" viewport="700x320" name="Libre Caslon — the record" subtitle="The printed official record: gazettes, declarations, the reference register" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--surface-page); }
  .d { font-family: var(--font-masthead); font-size: 60px; font-weight: 400; line-height: 1.04; letter-spacing: var(--ls-display); color: var(--text-primary); margin: 0; }
  .t { font-family: var(--font-serif); font-size: 27px; font-weight: 400; font-style: italic; line-height: 1.2; color: var(--text-secondary); margin: 14px 0 0; }
  .row { display: flex; gap: 26px; align-items: baseline; margin-top: 18px; flex-wrap: wrap; }
  .row span { font-family: var(--font-serif); color: var(--text-primary); font-size: 30px; }
  .w4 { font-weight: 400; } .w6 { font-weight: 600; } .w7 { font-weight: 700; } .it { font-style: italic; }
  .lab { font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
  <p class="d">Sharpeville, 1960</p>
  <p class="t">A record of how a country was made, unmade, and remade.</p>
  <div class="row">
    <span class="w4">Aa</span><span class="w6">Aa</span><span class="w7">Aa</span><span class="w4 it">Aa</span>
    <span class="lab">Caslon Display (mastheads) · Caslon Text 400 / 600 / 700 · italic</span>
  </div>
</body>
</html>
