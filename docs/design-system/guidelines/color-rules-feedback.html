<!-- @dsCard group="Colors" viewport="700x190" name="Rules & feedback" subtitle="Finding-aid hairlines and restrained semantic states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 32px; background: var(--surface-page); display:grid; grid-template-columns: 1.1fr 1fr; gap: 36px; }
  h4 { margin: 0 0 12px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); }
  .rule { margin-bottom: 12px; }
  .rule .l { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
  .feedback { display: flex; gap: 10px; flex-wrap: wrap; }
  .dot { display: flex; align-items: center; gap: 7px; font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .dot i { width: 14px; height: 14px; border-radius: var(--radius-full); display: inline-block; }
</style>
</head>
<body>
  <div>
    <h4>Hairlines</h4>
    <div class="rule"><div class="l">--border-faint</div><div style="border-top:1px solid var(--border-faint)"></div></div>
    <div class="rule"><div class="l">--border-default</div><div style="border-top:1px solid var(--border-default)"></div></div>
    <div class="rule"><div class="l">--border-strong (2px)</div><div style="border-top:2px solid var(--border-strong)"></div></div>
  </div>
  <div>
    <h4>Semantic</h4>
    <div class="feedback">
      <span class="dot"><i style="background:var(--saho-success)"></i>Success</span>
      <span class="dot"><i style="background:var(--saho-warning)"></i>Warning</span>
      <span class="dot"><i style="background:var(--saho-danger)"></i>Danger</span>
      <span class="dot"><i style="background:var(--saho-info)"></i>Info</span>
    </div>
  </div>
</body>
</html>
