<!-- @dsCard group="Brand" viewport="700x230" name="The open record" subtitle="Provenance is visible · the scholarly apparatus is the brand" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 32px; background: var(--surface-page); }
  .lead { font-family: var(--font-display); font-size: 26px; font-weight: 700; line-height: 1.2; color: var(--text-primary); letter-spacing: var(--ls-tight); margin: 0 0 16px; max-width: 24ch; }
  .lead em { color: var(--accent); font-style: italic; }
  .principles { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .p { border-top: 2px solid var(--accent); padding-top: 10px; }
  .p .n { font-family: var(--font-mono); font-size: 11px; color: var(--accent); font-weight: 600; letter-spacing: .06em; }
  .p .h { font-family: var(--font-sans); font-size: 14px; font-weight: 700; color: var(--text-primary); margin: 4px 0 3px; }
  .p .d { font-family: var(--font-sans); font-size: 12.5px; line-height: 1.5; color: var(--text-muted); }
</style>
</head>
<body>
  <p class="lead">Knowledge here is <em>free, sourced, and accessible.</em></p>
  <div class="principles">
    <div class="p"><div class="n">01</div><div class="h">Provenance is visible</div><div class="d">Sources, citations and dates are part of the visual language · never buried in footers.</div></div>
    <div class="p"><div class="n">02</div><div class="h">The archive comes first</div><div class="d">Search, browse, timeline and biography lead. A visitor is inside the material within one interaction.</div></div>
  </div>
</body>
</html>
