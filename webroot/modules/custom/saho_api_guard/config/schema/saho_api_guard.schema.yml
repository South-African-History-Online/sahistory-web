saho_api_guard.settings:
  type: config_object
  label: 'SAHO API Guard settings'
  mapping:
    rate_limit_enabled:
      type: boolean
      label: 'Enable JSON:API write rate limiting'
    writes_per_minute:
      type: integer
      label: 'Max JSON:API writes per account per minute'
    writes_per_hour:
      type: integer
      label: 'Max JSON:API writes per account per hour'
