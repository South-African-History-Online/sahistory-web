saho_donate.form:
  path: '/donate'
  defaults:
    _controller: '\Drupal\saho_donate\Controller\DonateController::page'
    _title: 'Donate to SAHO'
  requirements:
    _access: 'TRUE'

saho_donate.payfast_redirect:
  path: '/donate/pay'
  defaults:
    _controller: '\Drupal\saho_donate\Controller\DonateController::payfastRedirect'
    _title: 'Redirecting to PayFast'
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

saho_donate.payfast_return:
  path: '/donate/thank-you'
  defaults:
    _controller: '\Drupal\saho_donate\Controller\DonateController::thankYou'
    _title: 'Thank You for Your Donation'
  requirements:
    _access: 'TRUE'

saho_donate.payfast_cancel:
  path: '/donate/cancelled'
  defaults:
    _controller: '\Drupal\saho_donate\Controller\DonateController::cancelled'
    _title: 'Donation Cancelled'
  requirements:
    _access: 'TRUE'

saho_donate.payfast_notify:
  path: '/donate/notify'
  defaults:
    _controller: '\Drupal\saho_donate\Controller\DonateController::notify'
    _title: 'PayFast Notification'
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE
