services:
  saho_frontpage.archive_counts:
    class: Drupal\saho_frontpage\ArchiveCountsService
    arguments:
      - '@entity_type.manager'
      - '@cache.default'
      - '@database'
      - '@saho_refs.display_ref'
      - '@date.formatter'
      - '@datetime.time'
  saho_frontpage.current_feature:
    class: Drupal\saho_frontpage\CurrentFeatureService
    arguments:
      - '@entity_type.manager'
  saho_frontpage.home_layout:
    class: Drupal\saho_frontpage\HomeLayoutRebuilder
    arguments:
      - '@entity_type.manager'
      - '@state'
      - '@uuid'
      - '@keyvalue.expirable'
