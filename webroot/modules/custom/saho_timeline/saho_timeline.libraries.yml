timeline-app:
  version: 2.0.0
  css:
    theme:
      # Authored directly (not built): styles the server-rendered shell,
      # so it must load even when JS never runs. Svelte component styles
      # ship inside timeline.js (IIFE build inlines them).
      css/timeline-app.css: {}
  js:
    dist/timeline.js: { minified: true, attributes: { defer: true } }
  dependencies:
    - core/drupalSettings

timeline-interactive:
  version: 1.x
  css:
    theme:
      css/timeline-interactive.css: {}
  js:
    js/timeline.js: {}
  dependencies:
    - core/drupal
    - core/jquery
    - core/once
