saho_timeline.settings:
  type: config_object
  label: 'SAHO Timeline settings'
  mapping:
    default_display_mode:
      type: string
      label: 'Default display mode'
    items_per_page:
      type: integer
      label: 'Items per page'
    default_grouping:
      type: string
      label: 'Default grouping'
    enable_infinite_scroll:
      type: boolean
      label: 'Enable infinite scroll'
    enable_fuzzy_search:
      type: boolean
      label: 'Enable fuzzy search'
    search_debounce:
      type: integer
      label: 'Search debounce (ms)'
    min_search_length:
      type: integer
      label: 'Minimum search length'
    show_event_images:
      type: boolean
      label: 'Show event images'
    event_excerpt_length:
      type: integer
      label: 'Event excerpt length'
    enable_animations:
      type: boolean
      label: 'Enable animations'
    show_period_counts:
      type: boolean
      label: 'Show period counts'
    show_filters:
      type: boolean
      label: 'Show filters'
    enable_location_filter:
      type: boolean
      label: 'Enable location filter'
    enable_theme_filter:
      type: boolean
      label: 'Enable theme filter'
    enable_date_range:
      type: boolean
      label: 'Enable date range'
    include_tdih_events:
      type: boolean
      label: 'Include TDIH events'
    parse_html_timelines:
      type: boolean
      label: 'Parse HTML timelines'
    enable_solr:
      type: boolean
      label: 'Enable Solr'
    cache_lifetime:
      type: integer
      label: 'Cache lifetime (seconds)'
    max_api_results:
      type: integer
      label: 'Maximum API results'
