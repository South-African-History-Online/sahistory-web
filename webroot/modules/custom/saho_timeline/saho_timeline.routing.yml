saho_timeline.main:
  path: '/timeline'
  defaults:
    _controller: '\Drupal\saho_timeline\Controller\TimelineController::display'
    _title: 'Historical Timeline'
  requirements:
    _permission: 'access timeline'

saho_timeline.search:
  path: '/search/advanced'
  defaults:
    _form: '\Drupal\saho_timeline\Form\AdvancedSearchForm'
    _title: 'Advanced Search'
  requirements:
    _permission: 'access content'

saho_timeline.api.v2.index:
  path: '/api/timeline/v2/index'
  defaults:
    _controller: '\Drupal\saho_timeline\Controller\TimelineApiV2Controller::index'
  requirements:
    _permission: 'use timeline api'
  methods: [GET]
  options:
    no_cache: FALSE

saho_timeline.api.v2.bucket:
  path: '/api/timeline/v2/events/{bucket}'
  defaults:
    _controller: '\Drupal\saho_timeline\Controller\TimelineApiV2Controller::bucket'
  requirements:
    _permission: 'use timeline api'
    bucket: 'pre1500|\d{3}0'
  methods: [GET]
  options:
    no_cache: FALSE

saho_timeline.api.v2.event:
  path: '/api/timeline/v2/event/{node}'
  defaults:
    _controller: '\Drupal\saho_timeline\Controller\TimelineApiV2Controller::event'
  requirements:
    _permission: 'use timeline api'
    node: '\d+'
  methods: [GET]
  options:
    no_cache: FALSE
    parameters:
      node:
        type: 'entity:node'

saho_timeline.api.events:
  path: '/api/timeline/events'
  defaults:
    _controller: '\Drupal\saho_timeline\Controller\TimelineApiController::getEvents'
  requirements:
    _permission: 'use timeline api'
  methods: [GET]
  options:
    no_cache: FALSE

saho_timeline.api.search:
  path: '/api/search/advanced'
  defaults:
    _controller: '\Drupal\saho_timeline\Controller\TimelineApiController::getEvents'
  requirements:
    _permission: 'use timeline api'
  methods: [GET, POST]
  options:
    no_cache: FALSE

saho_timeline.migration:
  path: '/admin/config/saho/timeline/migration'
  defaults:
    _form: '\Drupal\saho_timeline\Form\TimelineMigrationForm'
    _title: 'Timeline Migration'
  requirements:
    _permission: 'migrate timeline content'

saho_timeline.settings:
  path: '/admin/config/saho/timeline/settings'
  defaults:
    _form: '\Drupal\saho_timeline\Form\TimelineSettingsForm'
    _title: 'Timeline Settings'
  requirements:
    _permission: 'administer timeline'