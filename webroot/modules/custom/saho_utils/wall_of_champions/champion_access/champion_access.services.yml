services:
  champion_access.role_service:
    class: Drupal\champion_access\Service\ChampionRoleService
    arguments:
      - '@entity_type.manager'
    tags: []

  champion_access.order_subscriber:
    class: Drupal\champion_access\EventSubscriber\ChampionOrderSubscriber
