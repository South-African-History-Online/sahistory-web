services:
  champion_access.role_service:
    class: Drupal\champion_access\Service\ChampionRoleService
    arguments:
      - '@database'
    tags: []

  champion_access.subscription_subscriber:
    class: Drupal\champion_access\EventSubscriber\SubscriptionStateSubscriber
    arguments:
      - '@champion_access.role_service'
      - '@logger.factory'
      - '@?saho_payfast.api'
    tags:
      - { name: event_subscriber }
