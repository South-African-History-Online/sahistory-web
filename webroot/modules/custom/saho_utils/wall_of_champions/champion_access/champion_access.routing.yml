champion_access.subscription_cancel:
  path: '/user/{user}/subscriptions/{commerce_subscription}/cancel'
  defaults:
    _form: '\Drupal\champion_access\Form\SubscriptionCancelForm'
    _title: 'Cancel Your Champion Membership'
  requirements:
    _custom_access: '\Drupal\champion_access\Form\SubscriptionCancelForm::access'
  options:
    parameters:
      user:
        type: entity:user
      commerce_subscription:
        type: entity:commerce_subscription
