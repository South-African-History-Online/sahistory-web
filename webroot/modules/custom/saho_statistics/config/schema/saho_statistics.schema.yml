saho_statistics.settings:
  type: config_object
  label: 'SAHO Statistics settings'
  mapping:
    track_searches:
      type: boolean
      label: 'Enable search query tracking'
    search_query_retention:
      type: integer
      label: 'Data retention period (days)'

block.settings.saho_top_read_content:
  type: block_settings
  label: 'SAHO Top Read Content block'
  mapping:
    items_per_page:
      type: integer
      label: 'Number of items to display'
    time_period:
      type: string
      label: 'Time period'
    content_types:
      type: sequence
      label: 'Content types'
      sequence:
        type: string
        label: 'Content type'
    display_mode:
      type: string
      label: 'Display mode'
    show_view_count:
      type: boolean
      label: 'Show view count'
    show_thumbnail:
      type: boolean
      label: 'Show thumbnail images'
    full_width:
      type: boolean
      label: 'Full width display'
    block_title:
      type: label
      label: 'Block title'

block.settings.saho_history_through_pictures:
  type: block_settings
  label: 'History Through Pictures block'
  mapping:
    items_per_page:
      type: integer
      label: 'Number of images to display'
    display_mode:
      type: string
      label: 'Display mode'
    show_title:
      type: boolean
      label: 'Show image titles'
    show_caption:
      type: boolean
      label: 'Show captions'
    block_title:
      type: label
      label: 'Block title'
    sort_order:
      type: string
      label: 'Sort order'
    manual_selection:
      type: string
      label: 'Manual image selection'
