<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 380" fill="none">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#3a4a64"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#990000"/>
      <stop offset="100%" stop-color="#7a0000"/>
    </linearGradient>
  </defs>

  <!-- Book shadow -->
  <rect x="28" y="12" width="244" height="360" rx="4" fill="rgba(0,0,0,0.15)"/>

  <!-- Book spine -->
  <rect x="16" y="8" width="32" height="360" rx="3" fill="url(#spine)"/>

  <!-- Book cover -->
  <rect x="40" y="8" width="224" height="360" rx="3" fill="url(#cover)"/>

  <!-- Decorative top rule -->
  <rect x="56" y="32" width="192" height="3" rx="1.5" fill="#b88a2e"/>

  <!-- Decorative bottom rule -->
  <rect x="56" y="340" width="192" height="3" rx="1.5" fill="#b88a2e"/>

  <!-- Open book icon -->
  <g transform="translate(108, 90)">
    <path d="M32 4C32 4 20 0 0 0V60C20 60 32 64 32 64V4Z" fill="rgba(255,255,255,0.12)"/>
    <path d="M32 4C32 4 44 0 64 0V60C44 60 32 64 32 64V4Z" fill="rgba(255,255,255,0.08)"/>
    <line x1="32" y1="4" x2="32" y2="64" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- Page lines left -->
    <line x1="6" y1="18" x2="28" y2="18" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="26" x2="28" y2="26" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="34" x2="28" y2="34" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="42" x2="28" y2="42" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Page lines right -->
    <line x1="36" y1="18" x2="58" y2="18" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="36" y1="26" x2="58" y2="26" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="36" y1="34" x2="58" y2="34" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="36" y1="42" x2="58" y2="42" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- SAHO label -->
  <text x="152" y="208" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" letter-spacing="4" fill="#b88a2e">SAHO</text>

  <!-- "Publication" label -->
  <text x="152" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="9" letter-spacing="2" fill="rgba(255,255,255,0.45)">PUBLICATION</text>

  <!-- Decorative gold star -->
  <text x="152" y="272" text-anchor="middle" font-size="20" fill="#b88a2e">★</text>

  <!-- Bottom publisher line -->
  <rect x="96" y="310" width="112" height="1" fill="rgba(255,255,255,0.15)"/>
  <text x="152" y="326" text-anchor="middle" font-family="Georgia, serif" font-size="8" letter-spacing="1.5" fill="rgba(255,255,255,0.3)">SOUTH AFRICAN HISTORY ONLINE</text>
</svg>
