'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/11.0.x/core/modules/sdc/src/metadata.schema.json'
name: Tag
machine_name: saho_tag
status: stable
group: 'SAHO Core'
description: 'Filter / cross-reference chip. Quieter than a Badge; used for navigation (eras, themes, places), with an optional mono result count.'
props:
  type: object
  properties:
    href:
      type: string
      title: URL
    active:
      type: boolean
      title: 'Selected'
      default: false
    count:
      type: integer
      title: 'Result count'
slots:
  label:
    title: Label
libraryDependencies:
  - saho/saho-tag
