'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/11.0.x/core/modules/sdc/src/metadata.schema.json'
machine_name: saho_image_credit
name: 'Image credit'
status: stable
group: 'SAHO Provenance'
description: 'Archival figure with rigorous, always-visible credit + provenance. Optional archival duotone unifies disparate sources. Dignity is the governing word.'
libraryDependencies:
  - saho/saho-image-credit
props:
  type: object
  properties:
    src:
      type: string
      title: 'Image URL'
    alt:
      type: string
      title: 'Alt text'
      default: ''
    credit:
      type: string
      title: 'Credit (photographer / rights holder)'
    source:
      type: string
      title: 'Source (collection / reference)'
    caption:
      type: string
      title: Caption
    duotone:
      type: boolean
      title: 'Archival duotone'
      default: false
    ratio:
      type: string
      title: 'Aspect ratio'
      default: '4 / 3'
