'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/11.0.x/core/modules/sdc/src/metadata.schema.json'
machine_name: saho_degraded_image
name: 'Degraded image'
status: stable
group: 'SAHO Provenance'
description: 'Deliberate treatment for missing, corrupt or absent imagery (design review R3, X-1). Archival placeholder by default; initials tile for biography portraits - dignified, name-derived, never a generic person icon.'
props:
  type: object
  properties:
    variant:
      type: string
      title: Variant
      enum:
        - placeholder
        - initials
      default: placeholder
    initials:
      type: string
      title: 'Subject initials (initials variant)'
    label:
      type: string
      title: 'Mono caption'
      default: 'No image in the record'
    ratio:
      type: string
      title: 'CSS aspect-ratio'
      default: '3 / 4'
