'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/11.0.x/core/modules/sdc/src/metadata.schema.json'

name: 'Record header'
machine_name: saho_record_header
status: stable
group: 'SAHO Content'
description: 'Frames any archive entity as a catalogue record: a typed folder tab, an accession reference, status, the record title, and a ruled strip of key fields. The data structure made visible — every page is a record.'
props:
  type: object
  properties:
    type:
      type: string
      title: 'Content type'
      enum: [article, biography, place, archive, event, topic, image]
      default: article
    reference:
      type: string
      title: 'Accession reference'
    status:
      type: string
      title: Status
    kicker:
      type: string
      title: Kicker
    title:
      type: string
      title: Title
    facts:
      type: array
      title: 'Key fields'
      items:
        type: object
        properties:
          label: { type: string }
          value: { type: string }
    image:
      type: object
      title: 'Lead image (mobile only)'
      description: 'record_image props; shown under the title on narrow screens so the person/place leads instead of hiding below the metadata.'
      properties:
        src: { type: string }
        alt: { type: string }
        caption: { type: string }
        credit: { type: string }
        duotone: { type: boolean }
        ratio: { type: string }
        orientation: { type: string }
slots:
  actions:
    title: Actions

libraryDependencies:
  - saho/saho-record-header
