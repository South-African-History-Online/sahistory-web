$schema: 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/modules/sdc/src/metadata.schema.json'
name: SAHO Reading List
machine_name: saho_reading_list
status: stable
description: 'A titled, responsive card grid of related / suggested records - the Open Record "further reading" engine at the foot of a record.'
props:
  type: object
  properties:
    title:
      type: string
      title: Heading
      description: The band heading, e.g. "Further reading".
    items:
      type: array
      title: Cards
      description: Card props passed through to saho:saho-card.
      items:
        type: object
