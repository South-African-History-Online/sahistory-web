'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/11.0.x/core/modules/sdc/src/metadata.schema.json'
name: 'Provenance block'
machine_name: saho_provenance_block
status: stable
group: 'SAHO Provenance'
description: '"How we know this." The scholarly apparatus made visible: a plain-language sourcing note and a numbered, linked source list. Belongs inline on the record, never in a footer.'
props:
  type: object
  properties:
    title:
      type: string
      title: Title
      default: 'How we know this'
    note:
      type: string
      title: 'Sourcing note'
    sources:
      type: array
      title: Sources
      items:
        type: object
        properties:
          author: { type: string }
          title: { type: string }
          detail: { type: string }
          href: { type: string }
    last_updated:
      type: string
      title: 'Last updated'
libraryDependencies:
  - saho/saho-provenance-block
