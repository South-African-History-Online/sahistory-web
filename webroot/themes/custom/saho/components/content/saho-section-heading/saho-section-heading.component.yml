# Drupal 11 Single Directory Component (SDC) Definition
# SAHO Section Heading - the ruled page-alignment device (2027 "Open Record").
# Exemplar port from docs/design-system/saho/components/section-heading proving
# the SDC port mechanic for Phase 1.

'$schema': https://git.drupalcode.org/project/drupal/-/raw/11.0.x/core/modules/sdc/src/metadata.schema.json

name: SAHO Section Heading
machine_name: saho_section_heading
description: 'A ruled section title for Layout Builder pages. The primary alignment device: a 2px underline that squares every section to one baseline. Optional kicker (eyebrow) + view-all link.'
status: stable
group: Content
category: Display

props:
  type: object
  properties:
    title:
      type: string
      title: Title
    kicker:
      type: string
      title: 'Kicker (eyebrow)'
    level:
      type: string
      title: 'Heading level'
      enum: [h2, h3, h4]
      default: h2
    href:
      type: string
      title: 'Link URL'
    link_label:
      type: string
      title: 'Link label'
      default: 'View all'

libraryDependencies:
  - saho/saho-section-heading
