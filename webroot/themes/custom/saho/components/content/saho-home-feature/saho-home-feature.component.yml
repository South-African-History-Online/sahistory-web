'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/11.0.x/core/modules/sdc/src/metadata.schema.json'
name: 'Home feature'
machine_name: saho_home_feature
status: stable
group: 'SAHO Content'
description: 'The current editorial feature on the catalogue front page: bold Archivo masthead on ink with an oxblood accent rule, standfirst, up to two actions and a mono provenance line. The editorial register.'
props:
  type: object
  required:
    - title
  properties:
    kicker:
      type: [string, 'null']
      title: Kicker
      default: 'Current feature'
    title:
      type: string
      title: Title
    standfirst:
      type: [string, 'null']
      title: Standfirst
    href:
      type: [string, 'null']
      title: 'Feature URL'
    cta_label:
      type: [string, 'null']
      title: 'Primary action label'
      default: 'Open the feature'
    secondary_href:
      type: [string, 'null']
      title: 'Secondary action URL'
    secondary_label:
      type: [string, 'null']
      title: 'Secondary action label'
      default: 'View chronology'
    meta:
      type: [string, 'null']
      title: 'Mono meta line (register / reference)'
    heading_level:
      type: [string, 'null']
      title: 'Heading tag for the title (h1 or h2)'
      default: h1
libraryDependencies:
  - saho/saho-home-feature
