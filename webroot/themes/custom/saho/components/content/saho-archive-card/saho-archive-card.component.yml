'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/11.0.x/core/modules/sdc/src/metadata.schema.json'
name: 'Archive card'
machine_name: saho_archive_card
status: stable
group: 'SAHO Content'
description: 'The workhorse index card for a record (biography, article, event, place). Content-type accent edge, optional duotone thumbnail with on-image badge, mono meta. The whole card is a link.'
props:
  type: object
  properties:
    type:
      type: string
      title: 'Content type'
      enum: [article, biography, place, archive, event, topic]
      default: article
    title:
      type: string
      title: Title
    href:
      type: string
      title: URL
      default: '#'
    excerpt:
      type: string
      title: Excerpt
    dates:
      type: string
      title: 'Date / span'
    meta:
      type: string
      title: 'Meta line'
    badge_label:
      type: string
      title: 'Badge label override'
    image:
      type: string
      title: 'Image URL'
    image_alt:
      type: string
      title: 'Image alt text'
      default: ''
    duotone:
      type: boolean
      title: 'Archival duotone'
      default: true
libraryDependencies:
  - saho/saho-archive-card
