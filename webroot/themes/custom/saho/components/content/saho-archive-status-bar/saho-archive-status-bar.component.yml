'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/11.0.x/core/modules/sdc/src/metadata.schema.json'
name: 'Archive status bar'
machine_name: saho_archive_status_bar
status: stable
group: 'SAHO Content'
description: 'Ruled row of live record counts in mono: the catalogue front door status line. Scrolls horizontally inside its own box on small screens.'
props:
  type: object
  required:
    - stats
  properties:
    stats:
      type: array
      title: 'Count rows'
      items:
        type: object
        properties:
          label:
            type: string
            title: Label
          value:
            type: string
            title: 'Pre-formatted value'
libraryDependencies:
  - saho/saho-archive-status-bar
