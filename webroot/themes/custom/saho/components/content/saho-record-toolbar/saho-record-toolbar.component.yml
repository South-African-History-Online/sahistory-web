'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/11.0.x/core/modules/sdc/src/metadata.schema.json'
machine_name: saho_record_toolbar
name: 'Record toolbar'
status: stable
group: 'SAHO Record'
description: 'The one research-tool row every record carries (R3 #476): Cite, the permanent /ref/ address, Share and a Connections jump. Becomes the page''s single sticky apparatus row once scrolled past (X-2), surfacing the REF so the reader always knows which record they are in.'
props:
  type: object
  properties:
    reference:
      type: string
      title: 'Display reference (shown when stuck)'
    permanent_url:
      type: string
      title: 'Absolute /ref/ URL to copy'
    styles_count:
      type: integer
      title: 'Citation style count shown as proof'
      default: 5
    connections_count:
      type: integer
      title: 'Related-tab item total; omits the action when 0'
