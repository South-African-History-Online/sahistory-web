'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/11.0.x/core/modules/sdc/src/metadata.schema.json'
name: Timeline
machine_name: saho_timeline
status: stable
group: 'SAHO Navigation'
description: 'The chronology spine — SAHO''s first-class navigational surface. Dot markers on a ruled spine, optional theme filter toggles. Chronology is how this material wants to be navigated.'
props:
  type: object
  properties:
    title:
      type: string
      title: Title
      default: Chronology
    themes:
      type: array
      title: 'Filter themes'
      items: { type: string }
    events:
      type: array
      title: Events
      items:
        type: object
        properties:
          year: { type: string }
          title: { type: string }
          detail: { type: string }
          theme: { type: string }
          href: { type: string }
libraryDependencies:
  - saho/saho-timeline
