# SAHO Layout Builder layouts. These give a fixed, aligned grid to place
# Single Directory Components into. Every layout is mobile-first (single column)
# and snaps to the shared container + gutter, so the page stays aligned no matter
# what blocks are dropped in. Core auto-discovers <theme>.layouts.yml.

saho_standard:
  label: 'SAHO — Standard column'
  category: 'SAHO'
  path: layouts/standard
  template: saho-standard
  default_region: content
  icon_map:
    - [content]
  regions:
    content:
      label: Content

saho_record:
  label: 'SAHO — Record + rail'
  category: 'SAHO'
  path: layouts/record
  template: saho-record
  default_region: main
  icon_map:
    - [main, rail]
  regions:
    main:
      label: 'Record body'
    rail:
      label: 'Rail (provenance / chronology / related)'

saho_index:
  label: 'SAHO — Index grid'
  category: 'SAHO'
  path: layouts/index
  template: saho-index
  default_region: grid
  icon_map:
    - [grid, grid, grid]
  regions:
    grid:
      label: 'Record grid'

saho_editorial:
  label: 'SAHO — Editorial feature'
  category: 'SAHO'
  path: layouts/editorial
  template: saho-editorial
  default_region: lead
  icon_map:
    - [lead, aside]
  regions:
    lead:
      label: 'Feature lead'
    aside:
      label: 'Aside (this day / index)'
